# Thin wrapper over `make publish/mail-mcp` (make is the CI control plane —
# see AGENTS.md). Only provider plumbing lives here: checkout, registry
# login, buildx. Runs on a native arm64 runner so the Rust build needs no
# emulation. Version bumps: re-run with the new upstream tag, then pin the
# printed digest in services/mail/Dockerfile.
name: Publish mail-mcp Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Upstream tag to build (e.g. v0.4.9)"
        required: true
        default: v0.4.9

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Buildx
        uses: docker/setup-buildx-action@v3
      - name: Publish
        run: make publish/mail-mcp MAIL_MCP_VERSION=${{ inputs.version }}
