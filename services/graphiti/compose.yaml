# graphiti: knowledge-graph long-term-memory MCP server + its FalkorDB store.
# Included by the root docker-compose.yaml with project_directory rooted at the
# app dir (/opt/mcp on the host), so relative paths here are from that root,
# NOT from this file's directory. Both services expose their ports on the
# compose network for Caddy and bind to 127.0.0.1 for SSM-tunnel debugging
# only — never to the public interface.
services:
  graphiti-mcp:
    image: zepai/knowledge-graph-mcp:standalone
    restart: unless-stopped
    depends_on:
      falkordb:
        condition: service_healthy
    environment:
      - FALKORDB_URI=redis://falkordb:6379
      - FALKORDB_PASSWORD=${FALKORDB_PASSWORD}
      - FALKORDB_DATABASE=default_db
      - GRAPHITI_GROUP_ID=main
      - SEMAPHORE_LIMIT=10
      - GRAPHITI_TELEMETRY_ENABLED=false
      - CONFIG_PATH=/config/config.yaml
      - MODEL_NAME=gpt-4.1-mini
      - EMBEDDER_MODEL=text-embedding-3-small
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PATH=/root/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      # Directory (not file) mount — see the caddy service's volume note.
      # Mounted at a clean path (CONFIG_PATH points into it) rather than over
      # the image's own config dir, so no image files get hidden. graphiti
      # reads config at startup only: after a config.yaml push,
      # `docker compose restart graphiti-mcp` picks it up.
      - ./services/graphiti:/config:ro
    ports:
      - "127.0.0.1:8000:8000" # debug via SSM tunnel only
    command: ["uv", "run", "main.py"]

  falkordb:
    image: falkordb/falkordb:latest
    restart: unless-stopped
    environment:
      # REDIS_ARGS is what the image actually applies as server config; the
      # bare FALKORDB_PASSWORD env is ignored for auth (observed 2026-07-19).
      - REDIS_ARGS=--requirepass ${FALKORDB_PASSWORD}
      - FALKORDB_PASSWORD=${FALKORDB_PASSWORD}
      - BROWSER=1
    volumes:
      - ./data/falkordb:/var/lib/falkordb/data
    ports:
      - "127.0.0.1:6379:6379" # debug via SSM tunnel only
      - "127.0.0.1:3000:3000" # FalkorDB browser UI, SSM tunnel only
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p 6379 -a \"$$FALKORDB_PASSWORD\" --no-auth-warning ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
